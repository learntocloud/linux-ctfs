name: Reply with FAQ and Conditional Labels

on:
  issues:
    types: [opened]

jobs:
  reply-and-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process issue for FAQ comment and labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title?.toLowerCase() || '';
            const body = issue.body?.toLowerCase() || '';
            const combined = `${title} ${body}`;
            const labels = [];

            // Detect issue category from title prefix and content
            const isSSH = title.includes('[ssh]') || combined.includes('permission denied') || combined.includes('publickey') || combined.includes('ssh') && (combined.includes('denied') || combined.includes('connect') || combined.includes('password'));
            const isTerraform = title.includes('[terraform]') || combined.includes('terraform') && (combined.includes('error') || combined.includes('failed') || combined.includes('init') || combined.includes('apply'));
            const isVerify = title.includes('[verify]') || combined.includes('verify') && (combined.includes('not found') || combined.includes('command not found') || combined.includes('progress') || combined.includes('export') || combined.includes('token'));
            const isChallenge = title.includes('[challenge]') || combined.includes('challenge') && (combined.includes('stuck') || combined.includes('hint') || combined.includes('how to'));
            const isFeature = title.includes('[feature]') || combined.includes('feature request') || combined.includes('enhancement') || combined.includes('suggestion');
            const isBug = title.includes('[bug]') || combined.includes('bug');

            // Apply labels based on detected category
            if (isSSH) labels.push('bug', 'DevOps');
            if (isTerraform) labels.push('bug', 'terraform');
            if (isVerify) labels.push('bug');
            if (isChallenge) labels.push('question');
            if (isBug && !isSSH && !isTerraform && !isVerify) labels.push('bug');

            // Add labels if any were found
            if (labels.length > 0) {
              const unique = [...new Set(labels)];
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: unique
              });
            }

            // Assign issue
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['rishabkumar7', 'madebygps']
              });
            } catch (error) {
              console.error('Error assigning issue:', error);
            }

            // Build a targeted response based on the issue category
            let comment = `Thanks for opening this issue! 👋\n\n`;

            if (isSSH) {
              comment += `## 🔑 SSH Connection Troubleshooting\n\n`;
              comment += `This looks like an SSH/connection issue. Here are the most common fixes:\n\n`;
              comment += `1. **Wait for setup to finish** — After \`terraform apply\`, wait 2-3 minutes for the VM setup script to complete before connecting.\n`;
              comment += `2. **Use the correct username** — Connect as \`ctf_user\` (not \`ubuntu\`, \`ec2-user\`, or \`root\`).\n`;
              comment += `3. **Use the correct password** — The password is \`CTFpassword123!\` (case-sensitive, includes the \`!\`).\n`;
              comment += `4. **Check your IP** — Use the public IP from \`terraform output\`.\n`;
              comment += `5. **Firewall/VPN** — If you're behind a corporate firewall or VPN, port 22 may be blocked.\n\n`;
              comment += `**SSH command format:**\n\`\`\`bash\nssh ctf_user@<PUBLIC_IP>\n\`\`\`\n\n`;
              comment += `If none of these help, please confirm you've checked each item above and share your exact error message.\n`;
            } else if (isTerraform) {
              comment += `## 🏗️ Terraform Troubleshooting\n\n`;
              comment += `This looks like a Terraform deployment issue. Common fixes:\n\n`;
              comment += `| Error | Fix |\n|-------|-----|\n`;
              comment += `| SKU/instance type not available | Try a different region or VM size. Edit the \`region\` variable in your \`.tfvars\` file. |\n`;
              comment += `| Provider version incompatible | Run \`terraform init -upgrade\` |\n`;
              comment += `| Quota exceeded | Check your cloud provider's quota/limits dashboard |\n`;
              comment += `| null_resource timeout | The VM setup can take up to 5 minutes. If it times out, SSH in manually — setup may still be running. |\n\n`;
              comment += `**Helpful commands:**\n\`\`\`bash\nterraform init -upgrade\nterraform plan\nterraform apply\n\`\`\`\n\n`;
              comment += `Please share the full error output if the above doesn't help.\n`;
            } else if (isVerify) {
              comment += `## ✅ Verify Tool Troubleshooting\n\n`;
              comment += `Here are common solutions for verify issues:\n\n`;
              comment += `- **"command not found"** — The setup script may not have finished. Wait a minute and try again, or reconnect via SSH.\n`;
              comment += `- **Progress stuck/wrong count** — Make sure you ran \`verify 0 CTF{example}\` first. This counts as challenge 0 and is required.\n`;
              comment += `- **Flag not accepted** — Ensure the flag format is exactly \`CTF{...}\` with no extra spaces before or after. Copy-paste if possible.\n`;
              comment += `- **Token not accepted on learntocloud.guide** — Try generating a new token with \`verify export <your_github_username>\`. Make sure you copy the entire token string.\n\n`;
              comment += `Run \`verify list\` to see all challenge statuses and identify which might be missing.\n`;
            } else if (isChallenge) {
              comment += `## 💡 Challenge Help\n\n`;
              comment += `For challenge-specific questions and help, please post in our [Community Discussions](https://github.com/learntocloud/learn-to-cloud-app/discussions). `;
              comment += `The community and maintainers can help you there without spoiling answers for others.\n\n`;
              comment += `**Quick tips before posting:**\n`;
              comment += `- Run \`verify hint <challenge_number>\` for a built-in hint\n`;
              comment += `- Re-read the challenge objective in the MOTD (shown on SSH login)\n\n`;
              comment += `Closing this issue — please reopen if this is actually a bug rather than a question.\n`;
            } else if (isFeature) {
              comment += `Thanks for the suggestion! 🙏\n\n`;
              comment += `For feature requests and ideas, please post in our [Community Discussions](https://github.com/learntocloud/learn-to-cloud-app/discussions). `;
              comment += `That way the community can upvote and discuss the idea.\n\n`;
              comment += `Closing this issue — a maintainer will reopen if we decide to track it here.\n`;
            } else {
              comment += `Please check our [FAQ page](https://github.com/learntocloud/linux-ctfs/wiki/FAQs) to see if your question is already answered.\n\n`;
              comment += `If not, we'll take a look and get back to you soon!\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });
